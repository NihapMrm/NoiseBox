name: Release

# Builds installers for Windows, macOS (Apple Silicon + Intel) and Linux,
# then attaches them to a GitHub Release. Triggered by pushing a version tag.
#
#   git tag v0.1.0
#   git push origin v0.1.0
#
# Optional: set FREESOUND_API_KEY / PIXABAY_API_KEY as repo secrets to bundle
# the default sounds into the build. Without them the app still works — sounds
# are lazy-downloaded at runtime using the user's own keys.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest      # Apple Silicon (arm64)
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest      # Intel (x86_64)
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install

      # Bundle the default sounds if API keys are configured. Non-fatal: the
      # download script exits non-zero without keys, but the app works without
      # bundled sounds (it lazy-downloads at runtime).
      - name: Download bundled sounds
        continue-on-error: true
        env:
          FREESOUND_API_KEY: ${{ secrets.FREESOUND_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
        run: pnpm download-sounds

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Noisebox ${{ github.ref_name }}'
          releaseBody: |
            Download the installer for your platform below.

            - **Windows** — `.exe` (recommended) or `.msi`
            - **macOS** — `.dmg` (arm64 for Apple Silicon, x64 for Intel)
            - **Linux** — `.AppImage` or `.deb`

            The app is unsigned, so your OS may warn on first launch:
            - Windows SmartScreen → "More info" → "Run anyway"
            - macOS Gatekeeper → right-click the app → "Open"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
